# ============================================================
#  WVP Cleanup Agent 配置文件
#  放置于 wvp-cleanup-agent.jar 同级目录
#  修改后重启 Agent 生效
# ============================================================

# ----------------------------------------------------------
#  ZLM 连接配置（必填）
#  Agent 启动时必须连上 ZLM 获取配置，否则一直重试不启动清理
# ----------------------------------------------------------
zlm:
  # ZLM 服务器 IP
  host: 127.0.0.1
  # ZLM HTTPS 端口（对应 config.ini 中 http.sslport）
  sslPort: 1443
  # ZLM API 密钥（对应 config.ini 中 api.secret，必须保持一致）
  secret: 请填写ZLM的api.secret

  # 启动时连接 ZLM 失败后的重试间隔（秒）
  retryInterval: 10

  # 运行时配置刷新间隔（秒），检测 ZLM 配置是否变更
  # ZLM 崩溃期间刷新失败不影响清理，继续用缓存配置
  configRefreshInterval: 600

# ----------------------------------------------------------
#  清理策略（可选，不配则使用默认值）
# ----------------------------------------------------------
cleanup:
  # 磁盘使用率阈值（百分比），超过此值触发清理
  # 支持小数，例如 53.5 = 53.5%
  diskThreshold: 80

  # 定时检查间隔（秒），每隔多少秒检查一次磁盘并执行清理
  # 例如: 60 = 每1分钟  /  300 = 每5分钟  /  1800 = 每30分钟
  checkInterval: 60

  # 单次清理最大删除文件数（安全帽，防止一次删太多）
  maxDeleteCount: 500

  # 单次清理最大清理数据库记录数（孤儿记录清理上限）
  maxDbCleanCount: 100

  # 是否自动清理空文件夹
  cleanEmptyDirs: true

# ----------------------------------------------------------
#  同步配置（可选）
# ----------------------------------------------------------
sync:
  # pending 记录最大保留条数
  pendingMaxCount: 200
  # pending 单条最大重试次数
  maxRetries: 10
  # pending 记录最大保留时间（小时），超时丢弃
  maxRetainHours: 72
  # WVP 心跳检测间隔（秒）
  heartbeatInterval: 30

# ----------------------------------------------------------
#  日志配置（可选）
# ----------------------------------------------------------
log:
  # 日志级别: DEBUG / INFO / WARN / ERROR
  level: INFO
  # 日志文件路径
  file: ./logs/agent.log
  # 日志保留天数
  maxHistory: 7